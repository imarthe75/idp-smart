#version: '3.8'

x-worker-base: &worker-base
  build: .
  restart: always
  env_file: .env
  volumes:
    - ./app:/app
  depends_on:
    - valkey
    - minio
  extra_hosts:
    - "host.docker.internal:host-gateway"
  command: celery -A worker.celery_app worker --loglevel=info --concurrency=1
  deploy:
    resources:
      limits:
        # ARQUITECTURA NOTARIAL: 8 workers concurrentes x 6GB = 48GB
        memory: 6000M

services:
  valkey:
    image: valkey/valkey:7.2
    container_name: idp_valkey
    ports: ["6379:6379"]
    restart: always

  db:
    image: postgres:18
    container_name: idp_db
    ports: ["5432:5432"]
    environment:
      - POSTGRES_USER=admin_user
      - POSTGRES_PASSWORD=Ad54=Tx91.Vm+23_Qr78
      - POSTGRES_DB=rpp
    volumes:
      - ./db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql
    restart: always

  minio:
    image: minio/minio:latest
    container_name: idp_minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=minio_password123
      - MINIO_NOTIFY_WEBHOOK_ENABLE_primary=on
      - MINIO_NOTIFY_WEBHOOK_ENDPOINT_primary=http://api:8000/api/v1/internal/minio-event
    command: server /data --console-address ":9001"
    volumes: ["minio_data:/data"]
    restart: always

  minio_setup:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin minio_password123) do sleep 1; done;
      /usr/bin/mc mb -p myminio/idp-documents;
      /usr/bin/mc event add myminio/idp-documents arn:minio:sqs::primary:webhook --event put;
      "

  api:
    build: .
    container_name: idp_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 3
    volumes: ["./app:/app"]
    ports: ["8000:8000"]
    env_file: [.env]
    depends_on: [valkey, minio]

  celery_beat:
    build: .
    container_name: idp_beat
    command: celery -A worker.celery_app beat --loglevel=info
    volumes: ["./app:/app"]
    env_file: [.env]
    depends_on: [valkey]
    restart: always

  # --- ARQUITECTURA OPTIMIZADA: 4 Workers Potentes (12 cores / 11GB RAM cada uno) ---
  worker_1:
    <<: *worker-base
    container_name: idp_worker_1
    cpuset: "0-11"
    environment: [OMP_NUM_THREADS=12]
    deploy:
      resources:
        limits:
          memory: 11000M

  worker_2:
    <<: *worker-base
    container_name: idp_worker_2
    cpuset: "12-23"
    environment: [OMP_NUM_THREADS=12]
    deploy:
      resources:
        limits:
          memory: 11000M

  worker_3:
    <<: *worker-base
    container_name: idp_worker_3
    cpuset: "24-35"
    environment: [OMP_NUM_THREADS=12]
    deploy:
      resources:
        limits:
          memory: 11000M

  worker_4:
    <<: *worker-base
    container_name: idp_worker_4
    cpuset: "36-47"
    environment: [OMP_NUM_THREADS=12]
    deploy:
      resources:
        limits:
          memory: 11000M

  # localai:
  #   image: localai/localai:latest
  #   container_name: idp_localai
  #   ports: ["8080:8080"]
  #   environment: [THREADS=4, MODELS_PATH=/models]
  #   volumes: ["./localai/models_clean:/models", "localai_data:/build"]
  #   restart: always

  frontend:
    image: node:lts
    container_name: idp_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes: ["./frontend:/app"]
    ports: ["5173:5173"]
    depends_on: [api]

volumes:
  minio_data:
  postgres_data:
  localai_data:
