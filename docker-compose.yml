#version: '3.8'

x-worker-base: &worker-base
  build: .
  restart: always
  env_file: .env
  volumes:
    - ./app:/app
  depends_on:
    - valkey
    - seaweedfs_s3
  extra_hosts:
    - "host.docker.internal:host-gateway"
  command: celery -A worker.celery_app worker --loglevel=info --concurrency=1
  deploy:
    resources:
      limits:
        # ARQUITECTURA NOTARIAL: 8 workers concurrentes x 6GB = 48GB
        memory: 6000M

networks:
  idp-smart-net:
    driver: bridge

services:
  valkey:
    image: valkey/valkey:7.2
    container_name: idp_valkey_v34
    ports: ["6379:6379"]
    restart: always
    networks: [idp-smart-net]

  db:
    image: postgres:18
    container_name: idp_db
    ports: ["5432:5432"]
    environment:
      - POSTGRES_USER=admin_user
      - POSTGRES_PASSWORD=Ad54=Tx91.Vm+23_Qr78
      - POSTGRES_DB=rpp
    command: >
      postgres
      -c shared_buffers=32GB
      -c effective_cache_size=128GB
      -c work_mem=128MB
      -c maintenance_work_mem=2GB
      -c max_connections=200
    volumes:
      - ./db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql
    restart: always
    networks: [idp-smart-net]

  # --- SEAWEEDFS: ALMACENAMIENTO DE ALTO RENDIMIENTO (Reemplazo de MinIO) ---
  seaweedfs_master:
    image: chrislusf/seaweedfs:latest
    container_name: idp_weed_master
    command: master -ip=seaweedfs_master
    ports: ["9333:9333"]
    restart: always
    networks: [idp-smart-net]

  seaweedfs_volume:
    image: chrislusf/seaweedfs:latest
    container_name: idp_weed_volume
    command: volume -mserver=seaweedfs_master:9333 -port=8080 -ip=seaweedfs_volume
    depends_on: [seaweedfs_master]
    volumes: ["seaweed_data:/data"]
    restart: always
    networks: [idp-smart-net]

  seaweedfs_filer:
    image: chrislusf/seaweedfs:latest
    container_name: idp_weed_filer
    command: filer -master=seaweedfs_master:9333
    ports: ["8888:8888"]
    volumes:
      - ./filer.toml:/etc/seaweedfs/filer.toml
    depends_on: [seaweedfs_master, seaweedfs_volume]
    restart: always
    networks: [idp-smart-net]

  seaweedfs_s3:
    image: chrislusf/seaweedfs:latest
    container_name: idp_weed_s3
    command: s3 -filer=seaweedfs_filer:8888 -ip.bind=0.0.0.0
    ports: ["8333:8333"]
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=seaweed_password123
    depends_on: [seaweedfs_filer]
    restart: always
    networks: [idp-smart-net]

  api:
    build: .
    container_name: idp_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 12
    volumes: ["./app:/app"]
    ports: ["8000:8000"]
    env_file: [.env]
    depends_on: [valkey, seaweedfs_s3]
    networks: [idp-smart-net]

  seaweedfs_setup:
    image: alpine:latest
    container_name: idp_weed_setup
    depends_on: [seaweedfs_filer]
    networks: [idp-smart-net]
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache curl;
      echo 'Esperando a SeaweedFS Filer...';
      until curl -s -f http://seaweedfs_filer:8888/ > /dev/null; do sleep 2; done;
      curl -X POST http://seaweedfs_filer:8888/idp-documents/;
      echo 'Bucket idp-documents listo.';
      "

  celery_beat:
    build: .
    container_name: idp_beat
    command: celery -A worker.celery_app beat --loglevel=info
    volumes: ["./app:/app"]
    env_file: [.env]
    depends_on: [valkey]
    restart: always
    networks: [idp-smart-net]

  docling_serve:
    build:
      context: .
      dockerfile: Dockerfile.docling
    container_name: idp_docling_serve
    restart: always
    env_file: .env
    volumes: ["./app:/app"]
    cpuset: "0-39"
    environment: 
      - OMP_NUM_THREADS=10
    deploy:
      resources:
        limits:
          memory: 80000M
    networks: [idp-smart-net]

  worker_1:
    <<: *worker-base
    container_name: idp_worker_1
    cpuset: "40-43"
    environment: [OMP_NUM_THREADS=4]
    deploy:
      resources:
        limits:
          memory: 10000M
    depends_on: [valkey, seaweedfs_s3, docling_serve]
    networks: [idp-smart-net]

  worker_2:
    <<: *worker-base
    container_name: idp_worker_2
    cpuset: "44-47"
    networks: [idp-smart-net]
  worker_3:
    <<: *worker-base
    container_name: idp_worker_3
    cpuset: "48-51"
    networks: [idp-smart-net]
  worker_4:
    <<: *worker-base
    container_name: idp_worker_4
    cpuset: "52-55"
    networks: [idp-smart-net]
  worker_5:
    <<: *worker-base
    container_name: idp_worker_5
    cpuset: "56-59"
    networks: [idp-smart-net]
  worker_6:
    <<: *worker-base
    container_name: idp_worker_6
    cpuset: "60-63"
    networks: [idp-smart-net]
  worker_7:
    <<: *worker-base
    container_name: idp_worker_7
    cpuset: "64-67"
    networks: [idp-smart-net]
  worker_8:
    <<: *worker-base
    container_name: idp_worker_8
    cpuset: "68-71"
    networks: [idp-smart-net]

  frontend:
    image: node:lts
    container_name: idp_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes: ["./frontend:/app"]
    ports: ["5173:5173"]
    depends_on: [api]
    networks: [idp-smart-net]

  frontend_angular:
    image: node:20
    container_name: idp_angular
    working_dir: /app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --port 5174"
    volumes: ["./frontend-angular:/app"]
    ports: ["5174:5174"]
    depends_on: [api]
    networks: [idp-smart-net]

volumes:
  seaweed_data:
  postgres_data:
  localai_data:
