#version: '3.8'

x-worker-base: &worker-base
  build: .
  restart: always
  env_file: .env
  volumes:
    - ./app:/app
  depends_on:
    - valkey
    - minio
  extra_hosts:
    - "host.docker.internal:host-gateway"
  command: celery -A worker.celery_app worker --loglevel=info --concurrency=1
  deploy:
    resources:
      limits:
        # ARQUITECTURA NOTARIAL: 8 workers concurrentes x 6GB = 48GB
        memory: 6000M

services:
  valkey:
    image: valkey/valkey:7.2
    container_name: idp_valkey_v34
    ports: ["6379:6379"]
    restart: always

  db:
    image: postgres:18
    container_name: idp_db
    ports: ["5432:5432"]
    environment:
      - POSTGRES_USER=admin_user
      - POSTGRES_PASSWORD=Ad54=Tx91.Vm+23_Qr78
      - POSTGRES_DB=rpp
    command: >
      postgres
      -c shared_buffers=32GB
      -c effective_cache_size=128GB
      -c work_mem=128MB
      -c maintenance_work_mem=2GB
      -c max_connections=200
    volumes:
      - ./db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql
    restart: always

  minio:
    image: minio/minio:latest
    container_name: idp_minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=minio_password123
      - MINIO_NOTIFY_WEBHOOK_ENABLE_primary=on
      - MINIO_NOTIFY_WEBHOOK_ENDPOINT_primary=http://api:8000/api/v1/internal/minio-event
    command: server /data --console-address ":9001"
    volumes: ["minio_data:/data"]
    restart: always

  minio_setup:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 admin minio_password123) do sleep 1; done;
      /usr/bin/mc mb -p myminio/idp-documents;
      /usr/bin/mc event add myminio/idp-documents arn:minio:sqs::primary:webhook --event put;
      "

  api:
    build: .
    container_name: idp_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 12
    volumes: ["./app:/app"]
    ports: ["8000:8000"]
    env_file: [.env]
    depends_on: [valkey, minio]

  celery_beat:
    build: .
    container_name: idp_beat
    command: celery -A worker.celery_app beat --loglevel=info
    volumes: ["./app:/app"]
    env_file: [.env]
    depends_on: [valkey]
    restart: always

  # --- ARQUITECTURA ESCALADA: 8 Workers Potentes (9 cores / 25GB RAM cada uno) ---
  # Utilizando 72 cores de los 80 disponibles para dejar margen al OS y servicios base.
  # --- MICROSERVICIO DE OCR: Docling Serve (Pesado) ---
  # Centraliza el procesamiento de Docling para evitar cargarlo en cada worker.
  docling_serve:
    build:
      context: .
      dockerfile: Dockerfile.docling
    container_name: idp_docling_serve
    restart: always
    env_file: .env
    volumes: ["./app:/app"]
    cpuset: "0-39"
    environment: 
      - OMP_NUM_THREADS=10
      - DOCLING_SERVER_URL=

    deploy:
      resources:
        limits:
          memory: 80000M

  # --- WORKERS SLIM: 8 Workers Ligeros (No cargan Docling en memoria) ---
  # Utilizan un promedio de 4 cores cada uno para orquestación y razonamiento.
  worker_1:
    <<: *worker-base
    container_name: idp_worker_1
    cpuset: "40-43"
    environment: [OMP_NUM_THREADS=4]
    deploy:
      resources:
        limits:
          memory: 10000M
    depends_on: [valkey, minio, docling_serve]

  worker_2:
    <<: *worker-base
    container_name: idp_worker_2
    cpuset: "44-47"
    environment: [OMP_NUM_THREADS=4]
    deploy:
      resources:
        limits:
          memory: 10000M
    depends_on: [valkey, minio, docling_serve]

  worker_3:
    <<: *worker-base
    container_name: idp_worker_3
    cpuset: "48-51"
    environment: [OMP_NUM_THREADS=4]
    deploy:
      resources:
        limits:
          memory: 10000M
    depends_on: [valkey, minio, docling_serve]

  worker_4:
    <<: *worker-base
    container_name: idp_worker_4
    cpuset: "52-55"
    environment: [OMP_NUM_THREADS=4]
    deploy:
      resources:
        limits:
          memory: 10000M
    depends_on: [valkey, minio, docling_serve]

  worker_5:
    <<: *worker-base
    container_name: idp_worker_5
    cpuset: "56-59"
    environment: [OMP_NUM_THREADS=4]
    deploy:
      resources:
        limits:
          memory: 10000M
    depends_on: [valkey, minio, docling_serve]

  worker_6:
    <<: *worker-base
    container_name: idp_worker_6
    cpuset: "60-63"
    environment: [OMP_NUM_THREADS=4]
    deploy:
      resources:
        limits:
          memory: 10000M
    depends_on: [valkey, minio, docling_serve]

  worker_7:
    <<: *worker-base
    container_name: idp_worker_7
    cpuset: "64-67"
    environment: [OMP_NUM_THREADS=4]
    deploy:
      resources:
        limits:
          memory: 10000M
    depends_on: [valkey, minio, docling_serve]

  worker_8:
    <<: *worker-base
    container_name: idp_worker_8
    cpuset: "68-71"
    environment: [OMP_NUM_THREADS=4]
    deploy:
      resources:
        limits:
          memory: 10000M
    depends_on: [valkey, minio, docling_serve]

  # localai:
  #   image: localai/localai:latest
  #   container_name: idp_localai
  #   ports: ["8080:8080"]
  #   environment: [THREADS=4, MODELS_PATH=/models]
  #   volumes: ["./localai/models_clean:/models", "localai_data:/build"]
  #   restart: always

  frontend:
    image: node:lts
    container_name: idp_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes: ["./frontend:/app"]
    ports: ["5173:5173"]
    depends_on: [api]

  frontend_angular:
    image: node:20
    container_name: idp_angular
    working_dir: /app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --port 5174"
    volumes: ["./frontend-angular:/app"]
    ports: ["5174:5174"]
    depends_on: [api]

volumes:
  minio_data:
  postgres_data:
  localai_data:
